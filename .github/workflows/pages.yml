name: Deploy dashboard a GitHub Pages

on:
  push:
    branches: [master]
    paths: ["web/**", ".github/workflows/pages.yml"]
  # Regenera los datos automáticamente cada día a las 11:00 UTC (06:00 Perú)
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias mínimas
        run: pip install requests

      - name: Regenerar data.json (datos oficiales en vivo)
        run: python web/build_data.py --periodos 2021 --fecha "$(date -u +%Y-%m-%d)"
        continue-on-error: true   # si la API falla, se publica el data.json versionado

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
