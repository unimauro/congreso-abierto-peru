name: Deploy dashboard a GitHub Pages

on:
  push:
    branches: [master]
    paths: ["web/**", ".github/workflows/pages.yml"]
  # Regenera los datos automáticamente cada día a las 11:00 UTC (06:00 Perú)
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias mínimas
        run: pip install requests

      - name: Regenerar data.json (datos oficiales en vivo)
        run: python web/build_data.py --periodos 2021 --fecha "$(date -u +%Y-%m-%d)"
        continue-on-error: true   # si la API falla, se publica el data.json versionado

      - name: Regenerar imágenes (OG + tarjeta) con datos frescos
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin
          python web/og_card.py    && rsvg-convert -w 1200 -h 630  web/og.svg    -o web/og.png
          python web/share_card.py && rsvg-convert -w 1080 -h 1350 web/share.svg -o web/share.png
        continue-on-error: true   # si rsvg falla, se publican las imágenes versionadas

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
