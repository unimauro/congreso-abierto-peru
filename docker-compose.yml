# Entorno de desarrollo — Congreso Abierto Perú
# Fase 1: PostgreSQL (con pgvector) + Redis. ClickHouse se habilita en Fase 3.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: congreso
      POSTGRES_PASSWORD: congreso
      POSTGRES_DB: congreso_abierto
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./warehouse/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U congreso -d congreso_abierto"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Descomentar en Fase 3 (Data Warehouse OLAP):
  # clickhouse:
  #   image: clickhouse/clickhouse-server:24-alpine
  #   ports:
  #     - "8123:8123"
  #     - "9000:9000"
  #   volumes:
  #     - chdata:/var/lib/clickhouse

volumes:
  pgdata:
  # chdata:
